<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'DM Sans', system-ui, sans-serif; background: #FAF8F5; }

  #app { display: flex; width: 100%; height: 100%; }

  /* LEFT PANEL */
  #panel { width: 310px; min-width: 310px; background: #fff; border-right: 1px solid #e8e2db; display: flex; flex-direction: column; overflow: hidden; }
  #panel-header { padding: 20px 18px 14px; border-bottom: 1px solid #e8e2db; }
  #panel-header h1 { font-family: 'DM Serif Display', serif; font-size: 24px; color: #7B2D26; letter-spacing: -0.5px; }
  #panel-header .sub { font-size: 11px; color: #888; margin-top: 4px; line-height: 1.4; }
  #panel-header .meta { font-size: 10px; color: #aaa; margin-top: 2px; }

  /* Downloads */
  #downloads { padding: 8px 18px 4px; border-bottom: 1px solid #e8e2db; }
  .dl-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .dl-btn {
    display: flex; align-items: center; justify-content: center; gap: 5px;
    padding: 6px 8px; border: 1px solid #d4c4be; border-radius: 6px; background: #faf8f5;
    font-size: 10px; font-family: 'DM Sans', sans-serif; color: #7B2D26; cursor: pointer;
    text-decoration: none; font-weight: 600; transition: all 0.15s; line-height: 1.2;
  }
  .dl-btn.wide { grid-column: 1 / -1; }
  .dl-btn:hover { background: #7B2D26; color: #fff; border-color: #7B2D26; }
  .dl-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
  .dl-btn:hover svg path { stroke: #fff; }

  #search-box { padding: 10px 18px; }
  #search-input {
    width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 7px;
    font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; background: #faf8f5;
    transition: border-color 0.15s;
  }
  #search-input:focus { border-color: #7B2D26; }
  #search-results { margin-top: 4px; border: 1px solid #eee; border-radius: 7px; background: #fff; max-height: 200px; overflow: auto; display: none; }
  .search-item { padding: 7px 12px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #f5f5f5; display: flex; align-items: center; gap: 8px; }
  .search-item:hover { background: #faf8f5; }
  .search-item:last-child { border-bottom: none; }

  /* Reset bar */
  #reset-bar {
    display: none; padding: 8px 18px; background: #fdf6f0; border-bottom: 1px solid #f0e0d0;
    align-items: center; gap: 8px;
  }
  #reset-bar.active { display: flex; }
  #reset-bar .filter-label { flex: 1; font-size: 11.5px; color: #7B2D26; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #reset-btn {
    padding: 4px 12px; border: 1px solid #d4a89a; border-radius: 5px; background: #fff;
    font-size: 11px; font-family: 'DM Sans', sans-serif; color: #7B2D26; cursor: pointer;
    font-weight: 600; transition: all 0.15s;
  }
  #reset-btn:hover { background: #7B2D26; color: #fff; }

  /* Clusters */
  #clusters { padding: 4px 18px 10px; }
  .section-label { font-size: 10px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .cluster-item {
    padding: 7px 10px; margin-bottom: 3px; border-radius: 6px; cursor: pointer;
    border: 1.5px solid transparent; transition: all 0.15s; display: flex; align-items: center; gap: 8px;
  }
  .cluster-item:hover { background: #faf8f5; }
  .cluster-item.active { border-color: var(--cc); background: var(--cbg); }
  .cluster-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .cluster-label { font-size: 11.5px; color: #333; flex: 1; line-height: 1.3; }
  .cluster-count { font-size: 10px; color: #aaa; }

  /* Detail / list area */
  #detail { flex: 1; overflow-y: auto; overflow-x: hidden; border-top: 1px solid #e8e2db; padding: 14px 18px; }
  #detail h2 { font-family: 'DM Serif Display', serif; font-size: 18px; color: #1a1a1a; }
  .detail-meta { display: flex; gap: 12px; font-size: 11px; color: #666; margin: 4px 0 12px; }
  .detail-meta strong { color: #7B2D26; }

  .profile-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .profile-label { width: 76px; font-size: 9.5px; color: #777; text-align: right; flex-shrink: 0; }
  .profile-bar-bg { flex: 1; height: 9px; background: #f0ece6; border-radius: 4px; overflow: hidden; }
  .profile-bar { height: 100%; border-radius: 4px; transition: width 0.3s ease; }
  .profile-val { width: 14px; font-size: 9px; color: #999; text-align: right; }

  .list-item {
    padding: 5px 8px; margin-bottom: 2px; border-radius: 5px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; font-size: 11.5px;
  }
  .list-item:hover { background: #faf8f5; }
  .list-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .list-name { flex: 1; color: #333; }
  .list-meta { font-size: 9px; color: #aaa; }
  .list-rank { font-size: 9px; color: #bbb; }

  .rank-num { width: 18px; font-size: 10px; color: #7B2D26; font-weight: 700; text-align: right; flex-shrink: 0; }

  .hint-box {
    margin-top: 16px; padding: 12px; background: #faf8f5; border-radius: 8px;
    font-size: 10.5px; color: #888; line-height: 1.6;
  }
  .hint-box strong { color: #666; }

  /* Canvas */
  #canvas { flex: 1; position: relative; overflow: hidden; }
  #canvas svg { width: 100%; height: 100%; background: #FAF8F5; }

  /* Tooltip */
  #tooltip {
    position: absolute; top: 12px; right: 12px; display: none;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(8px);
    border: 1px solid #e8e2db; border-radius: 10px; padding: 10px 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06); pointer-events: none; max-width: 230px;
  }
  #tooltip.visible { display: block; }
  #tooltip .tt-name { font-weight: 700; font-size: 13px; color: #1a1a1a; }
  #tooltip .tt-info { font-size: 11px; color: #666; line-height: 1.5; margin-top: 2px; }

  /* Keyboard hint */
  #kbd-hint {
    position: absolute; bottom: 12px; right: 12px;
    font-size: 10px; color: #bbb; background: rgba(255,255,255,0.8);
    padding: 6px 10px; border-radius: 6px;
  }
  kbd { background: #eee; padding: 1px 5px; border-radius: 3px; font-family: 'DM Sans', sans-serif; font-size: 9px; }
</style>

// ============================================================================
// BUILD GRAPH
// ============================================================================
function cosineSim(a,b){let d=0,na=0,nb=0;for(let i=0;i<a.length;i++){d+=a[i]*b[i];na+=a[i]*a[i];nb+=b[i]*b[i];}return d/(Math.sqrt(na)*Math.sqrt(nb)+1e-9);}

const grapes=Object.keys(PROFILES), K=5;
const simMat={};
for(const g of grapes){simMat[g]={};for(const h of grapes)if(g!==h)simMat[g][h]=cosineSim(PROFILES[g],PROFILES[h]);}

const edgeMap={};
for(const g of grapes){
  const top=Object.entries(simMat[g]).sort((a,b)=>b[1]-a[1]).slice(0,K);
  for(const [nb,w] of top){const k=[g,nb].sort().join("|||");if(!edgeMap[k]||w>edgeMap[k].weight)edgeMap[k]={source:g,target:nb,weight:w};}
}

const nodes=grapes.map(g=>({id:g,type:GRAPE_TYPE[g],community:COMMUNITIES[g],tr:TASTERANK[g]||0,profile:PROFILES[g],rank:0}));
nodes.sort((a,b)=>b.tr-a.tr);
nodes.forEach((n,i)=>n.rank=i+1);
const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const edges=Object.values(edgeMap);

function getNeighbors(id){const s=new Set();edges.forEach(e=>{const si=e.source?.id||e.source,ti=e.target?.id||e.target;if(si===id)s.add(ti);if(ti===id)s.add(si);});return s;}

let selectedNode=null, highlightCluster=null;

const clusterList=document.getElementById('cluster-list');
Object.entries(COMM_META).forEach(([id,m])=>{
  const count=nodes.filter(n=>n.community===+id).length;
  const el=document.createElement('div');
  el.className='cluster-item';el.dataset.cid=id;
  el.style.setProperty('--cc',m.color);el.style.setProperty('--cbg',m.bg);
  el.innerHTML=`<span class="cluster-dot" style="background:${m.color}"></span><span class="cluster-label">${m.short}</span><span class="cluster-count">${count}</span>`;
  el.addEventListener('click',()=>{
    const cid=+id;
    if(highlightCluster===cid){highlightCluster=null;}else{highlightCluster=cid;selectedNode=null;}
    updateClusterUI();updateVisuals();renderDetail();updateResetBar();
  });
  clusterList.appendChild(el);
});

function updateClusterUI(){
  document.querySelectorAll('.cluster-item').forEach(el=>{
    el.classList.toggle('active',highlightCluster===+el.dataset.cid);
  });
}

  if(q.length<2){searchResults.style.display='none';return;}
  const matches=nodes.filter(n=>n.id.toLowerCase().includes(q)).slice(0,8);
  if(!matches.length){searchResults.style.display='none';return;}

// ============================================================================
// D3 GRAPH
// ============================================================================
const container=document.getElementById('canvas');
const width=container.clientWidth, height=container.clientHeight;
const svg=d3.select('#graph-svg').attr('width',width).attr('height',height);
const g=svg.append('g');

const zoom=d3.zoom().scaleExtent([0.2,8]).on('zoom',ev=>g.attr('transform',ev.transform));
svg.call(zoom);

const maxTR=d3.max(nodes,d=>d.tr),minTR=d3.min(nodes,d=>d.tr);
const rScale=d3.scaleSqrt().domain([minTR,maxTR]).range([4,30]);

const simulation=d3.forceSimulation(nodes)
  .force('link',d3.forceLink(edges).id(d=>d.id).distance(d=>130-d.weight*70).strength(d=>d.weight*0.25))
  .force('charge',d3.forceManyBody().strength(-100))
  .force('center',d3.forceCenter(width/2,height/2))
  .force('collision',d3.forceCollide().radius(d=>rScale(d.tr)+4));

const link=g.append('g').selectAll('line').data(edges).join('line')
  .attr('stroke','#888').attr('stroke-opacity',0.18).attr('stroke-width',d=>0.4+d.weight*2);

const nodeG=g.append('g').selectAll('g').data(nodes).join('g').style('cursor','pointer')
  .call(d3.drag()
    .on('start',(ev,d)=>{if(!ev.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on('drag',(ev,d)=>{d.fx=ev.x;d.fy=ev.y;})
    .on('end',(ev,d)=>{if(!ev.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;})
  );

nodeG.append('circle').attr('r',d=>rScale(d.tr))
  .attr('fill',d=>COMM_META[d.community]?.color||'#888')
  .attr('stroke','#fff').attr('stroke-width',1.5).attr('opacity',0.88);

nodeG.filter(d=>d.rank<=30).append('text').text(d=>d.id)
  .attr('text-anchor','middle').attr('dy',d=>-rScale(d.tr)-5)
  .attr('font-size',d=>d.rank<=8?12:d.rank<=18?10:8.5)
  .attr('font-weight',d=>d.rank<=10?700:500)
  .attr('fill','#2a2a2a').attr('font-family',"'DM Sans', sans-serif").attr('pointer-events','none');

simulation.on('tick',()=>{
  link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeG.attr('transform',d=>`translate(${d.x},${d.y})`);
});

// Click handlers
nodeG.on('click',(ev,d)=>{ev.stopPropagation();selectNode(selectedNode?.id===d.id?null:d);});
svg.on('click',()=>resetAll());

// Hover tooltip
const tooltip=document.getElementById('tooltip');
nodeG.on('mouseenter',(ev,d)=>{
  if(selectedNode)return;
  tooltip.classList.add('visible');
  tooltip.innerHTML=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span style="width:10px;height:10px;border-radius:50%;background:${COMM_META[d.community].color}"></span><span class="tt-name">${d.id}</span></div><div class="tt-info">Rank #${d.rank} · TasteRank ${d.tr.toFixed(4)}<br>${d.type[0].toUpperCase()+d.type.slice(1)} · ${COMM_META[d.community].short}</div>`;
}).on('mouseleave',()=>{tooltip.classList.remove('visible');});

// Fit to view after stabilization
setTimeout(()=>{
  const b=g.node().getBBox();
  const dx=b.width,dy=b.height,x=b.x+dx/2,y=b.y+dy/2;
  const s=0.85/Math.max(dx/width,dy/height);
  svg.transition().duration(750).call(zoom.transform,d3.zoomIdentity.translate(width/2-s*x,height/2-s*y).scale(s));
},2500);

// ============================================================================
// SELECT / UPDATE VISUALS
// ============================================================================
function selectNode(n){selectedNode=n;highlightCluster=null;updateClusterUI();updateVisuals();renderDetail();updateResetBar();}

function updateVisuals(){
  const active=selectedNode;
  const nbs=active?getNeighbors(active.id):new Set();

  nodeG.select('circle').transition().duration(200)
    .attr('opacity',d=>{
      if(highlightCluster!==null&&d.community!==highlightCluster)return 0.06;
      if(active){if(d.id===active.id)return 1;if(nbs.has(d.id))return 0.92;return 0.07;}
      return 0.88;
    })
    .attr('stroke',d=>{
      if(active&&d.id===active.id)return '#000';
      if(active&&nbs.has(d.id))return '#333';
      return '#fff';
    })
    .attr('stroke-width',d=>{
      if(active&&d.id===active.id)return 3.5;
      if(active&&nbs.has(d.id))return 2;
      return 1.5;
    });

  // Static labels
  nodeG.selectAll('text:not(.dyn)').transition().duration(200)
    .attr('opacity',d=>{
      if(highlightCluster!==null&&d.community!==highlightCluster)return 0.04;
      if(active){if(d.id===active.id||nbs.has(d.id))return 1;return 0.04;}
      return 1;
    });

  // Dynamic labels
  nodeG.each(function(d){
    const sel=d3.select(this);
    const show=active?(d.id===active.id||nbs.has(d.id)):(highlightCluster!==null?d.community===highlightCluster:false);
    if(show&&d.rank>30&&!sel.select('.dyn').node()){
      sel.append('text').attr('class','dyn').text(d.id)
        .attr('text-anchor','middle').attr('dy',-rScale(d.tr)-5)
        .attr('font-size',9).attr('font-weight',500).attr('fill','#2a2a2a')
        .attr('font-family',"'DM Sans', sans-serif").attr('pointer-events','none')
        .attr('opacity',0).transition().duration(250).attr('opacity',1);
    }
    if(!show)sel.selectAll('.dyn').transition().duration(150).attr('opacity',0).remove();
  });

  link.transition().duration(200)
    .attr('stroke-opacity',d=>{
      const si=d.source.id,ti=d.target.id;
      if(highlightCluster!==null){
        const sc=nodeMap[si]?.community,tc=nodeMap[ti]?.community;
        if(sc===highlightCluster&&tc===highlightCluster)return 0.5;
        if(sc===highlightCluster||tc===highlightCluster)return 0.08;
        return 0.01;
      }
      if(active){if(si===active.id||ti===active.id)return 0.75;return 0.015;}
      return 0.18;
    })
    .attr('stroke-width',d=>{
      const si=d.source.id,ti=d.target.id;
      if(active&&(si===active.id||ti===active.id))return 1.5+d.weight*3;
      return 0.4+d.weight*2;
    })
    .attr('stroke',d=>{
      const si=d.source.id,ti=d.target.id;
      if(active&&(si===active.id||ti===active.id))return COMM_META[active.community]?.color||'#888';
      if(highlightCluster!==null){
        const sc=nodeMap[si]?.community,tc=nodeMap[ti]?.community;
        if(sc===highlightCluster&&tc===highlightCluster)return COMM_META[highlightCluster].color;
      }
      return '#888';
    });
}

function renderDetail(){
  const det=document.getElementById('detail');

  if(selectedNode){
    const n=selectedNode;
    const nbs=edges.filter(e=>(e.source.id||e.source)===n.id||(e.target.id||e.target)===n.id)
      .map(e=>{const oid=(e.source.id||e.source)===n.id?(e.target.id||e.target):(e.source.id||e.source);return{...nodeMap[oid],sim:e.weight};})
      .sort((a,b)=>b.sim-a.sim);

    let html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="width:14px;height:14px;border-radius:50%;background:${COMM_META[n.community].color}"></span>
      <h2>${n.id}</h2></div>
      <div class="detail-meta"><span>Rank <strong>#${n.rank}</strong></span><span>TasteRank <strong>${n.tr.toFixed(4)}</strong></span><span style="text-transform:capitalize">${n.type}</span></div>
      <div class="section-label">SAT Profile</div><div style="margin-bottom:14px">`;
    DIM_LABELS.forEach((l,i)=>{
      html+=`<div class="profile-row"><span class="profile-label">${l}</span><div class="profile-bar-bg"><div class="profile-bar" style="width:${n.profile[i]/5*100}%;background:${COMM_META[n.community].color}"></div></div><span class="profile-val">${n.profile[i]}</span></div>`;
    });
    html+=`</div><div class="section-label">Connected Varieties (${nbs.length})</div>`;
    nbs.forEach(nb=>{
      html+=`<div class="list-item" data-nid="${nb.id}"><span class="list-dot" style="background:${COMM_META[nb.community].color}"></span><span class="list-name">${nb.id}</span><span class="list-meta">cos ${nb.sim.toFixed(3)}</span><span class="list-rank">#${nb.rank}</span></div>`;
    });
    det.innerHTML=html;
    det.querySelectorAll('.list-item[data-nid]').forEach(el=>{
      el.addEventListener('click',ev=>{ev.stopPropagation();selectNode(nodeMap[el.dataset.nid]);});
    });

  } else if(highlightCluster!==null){
    const cn=nodes.filter(n=>n.community===highlightCluster).sort((a,b)=>a.rank-b.rank);
    const m=COMM_META[highlightCluster];
    let html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <span style="width:12px;height:12px;border-radius:3px;background:${m.color}"></span>
      <h2 style="font-size:14px;font-family:'DM Sans';font-weight:600">${m.label}</h2></div>
      <p style="font-size:11px;color:#888;margin-bottom:10px">${cn.length} varieties</p>`;
    cn.forEach(n=>{
      html+=`<div class="list-item" data-nid="${n.id}"><span class="list-dot" style="background:${m.color}"></span><span class="list-name">${n.id}</span><span class="list-meta" style="text-transform:capitalize">${n.type}</span><span class="list-rank">#${n.rank}</span></div>`;
    });
    det.innerHTML=html;
    det.querySelectorAll('.list-item[data-nid]').forEach(el=>{
      el.addEventListener('click',ev=>{ev.stopPropagation();selectNode(nodeMap[el.dataset.nid]);highlightCluster=null;updateClusterUI();updateResetBar();});
    });

  } else {
    let html=`<div class="section-label">Top 15 by TasteRank</div>`;
    nodes.filter(n=>n.rank<=15).sort((a,b)=>a.rank-b.rank).forEach(n=>{
      html+=`<div class="list-item" data-nid="${n.id}"><span class="rank-num">#${n.rank}</span><span class="list-dot" style="background:${COMM_META[n.community].color}"></span><span class="list-name">${n.id}</span><span class="list-meta">${n.tr.toFixed(3)}</span></div>`;
    });
    html+=`<div class="hint-box"><strong>Interactions</strong><br>Click a node to inspect its SAT profile and connections.<br>Click a community to isolate it.<br>Press <kbd>Esc</kbd> or click ✕ Reset to return to full view.<br>Scroll to zoom · drag to pan · drag nodes to rearrange.</div>`;
    det.innerHTML=html;
    det.querySelectorAll('.list-item[data-nid]').forEach(el=>{
      el.addEventListener('click',ev=>{ev.stopPropagation();selectNode(nodeMap[el.dataset.nid]);});
    });
  }
}

renderDetail();
</script>
</body>
</html>
